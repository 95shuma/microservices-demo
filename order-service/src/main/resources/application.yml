server:
  port: 8080

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:orders_db}
    username: ${DB_USER:orders}
    password: ${DB_PASSWORD:orders}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  grpc:
    client:
      channels:
        inventory:
          address: static://${INVENTORY_SERVICE_HOST:localhost}:${INVENTORY_SERVICE_GRPC_PORT:9091}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.example.orders: info
